name: Build and test SDK with latest Rust nightly

on:
  workflow_dispatch:
#   schedule:
#     # Every Monday at 3 AM UTC
#     - cron: '0 3 * * 1'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and test SDK (${{ matrix.target }})
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-dev-tools:latest
    strategy:
      fail-fast: false
      matrix:
        target: ["nanox", "nanosplus", "stax", "flex", "apex_p"]
    steps:
      - name: Clone
        uses: actions/checkout@v4

      - name: Install latest Rust nightly
        run: |
          rustup toolchain install nightly --component rust-src
          rustup target add thumbv6m-none-eabi --toolchain nightly
          cargo +nightly ledger setup -t custom_target_nightly
          echo "Rust version:"
          rustc +nightly --version

      - name: Override rust-toolchain.toml to use latest nightly
        run: |
          printf '[toolchain]\nchannel = "nightly"\n' > rust-toolchain.toml
          echo 'Overridden rust-toolchain.toml:'
          cat rust-toolchain.toml

      - name: Build SDK
        working-directory: ledger_device_sdk
        env:
          RUSTFLAGS: "-Zunstable-options"
        run: |
          cargo build --target ${{ matrix.target }}
          if [[ "${{ matrix.target }}" == "nanosplus" || "${{ matrix.target }}" == "nanox" ]]; then
            echo "Building with nano_nbgl feature for ${{ matrix.target }}"
            cargo build --target ${{ matrix.target }} --features nano_nbgl
          fi

      - name: Run unit tests
        working-directory: ledger_device_sdk
        env:
          RUSTFLAGS: "-Zunstable-options"
        run: cargo test --target ${{ matrix.target }} --features unit_test --tests
