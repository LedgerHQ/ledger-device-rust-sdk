name: Run cargo clippy, cargo fmt, build and Unit+Integration tests

on:
  push:
    branches:
      - develop
      - master
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:
    inputs:
      name:
        description: 'Manually triggered'
      rust_sdk_branch:
        description: 'Git branch or tag of the Rust SDK to use for this run'
        required: true
        type: string
      c_sdk_branch:
        description: 'Git branch or tag of the Ledger C SDK to use for this run'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Run static analysis
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-dev-tools:latest
    strategy:
      matrix:
        target: ["nanox", "nanosplus", "stax", "flex", "apex_p"]
        package: [include_gif, testmacro, ledger_secure_sdk_sys, ledger_device_sdk]
    steps:
      - name: Clone
        uses: actions/checkout@v4
      - name: Cargo clippy
        working-directory: ${{ matrix.package }}
        run: |
          cargo clippy --target ${{ matrix.target }}

  format:
    name: Check code formatting
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-dev-tools:latest
    steps:
      - name: Clone
        uses: actions/checkout@v4
      - name: Run cargo fmt
        run: |
          cargo fmt --all --check

  build:
    name: Build SDK
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/reusable_build_sdk.yml
    with:
      rust_sdk_branch: ${{ github.ref }}

  build_manual:
    name: Build SDK (manual)
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable_build_sdk.yml
    with:
      rust_sdk_branch: ${{ inputs.rust_sdk_branch }}
      c_sdk_branch: ${{ inputs.c_sdk_branch }}

  test:
    name: Run unit and integration tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ledgerhq/ledger-app-builder/ledger-app-dev-tools:latest
    strategy:
      matrix:
        target: ["nanox", "nanosplus", "stax", "flex", "apex_p"]
    steps:
      - name: Clone
        uses: actions/checkout@v4
      - name: Unit tests
        working-directory: ledger_device_sdk
        run: |
          cargo test --target ${{ matrix.target }} --features unit_test --tests

  build-apps:
    name: Build all Rust apps
    if: github.event_name != 'workflow_dispatch'
    uses: ./.github/workflows/reusable_build_all_apps.yml
    with:
      rust_sdk_branch: ${{ github.ref }}

  build-apps_manual:
    name: Build all Rust apps (manual)
    if: github.event_name == 'workflow_dispatch'
    uses: ./.github/workflows/reusable_build_all_apps.yml
    with:
      rust_sdk_branch: ${{ inputs.rust_sdk_branch }}
      c_sdk_branch: ${{ inputs.c_sdk_branch }}
